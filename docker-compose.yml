services:
  db-stock-data:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stock_data
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - data-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stock_data"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    command: python3 -B -m uvicorn main:app --host 0.0.0.0 --port 8000
    working_dir: /app/backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:password@db-stock-data:5432/stock_data?sslmode=disable
    volumes:
      - ~/.vnstock:/root/.vnstock:ro
    depends_on:
      db-stock-data:
        condition: service_healthy

  frontend:
    build: .
    command: python3 -B -m streamlit run app.py --server.port 8501 --server.headless true --server.address 0.0.0.0
    working_dir: /app/frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  data-volume:
